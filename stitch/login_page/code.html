<title>Login - Brew &amp; Bite Cafeteria</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 sm:p-8">
<!-- Top Navigation (Simplified for Login) -->
<header class="fixed top-0 left-0 right-0 flex items-center justify-between px-6 py-4 lg:px-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">

</div>
<h2 class="text-xl font-bold tracking-tight">Brew &amp; Bite</h2>
</div>
<div class="hidden md:flex gap-6">
<a class="text-slate-600 dark:text-slate-400 hover:text-primary transition-colors text-sm font-medium" href="#">Browse Menu</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary transition-colors text-sm font-medium" href="#">Need Help?</a>
</div>
</header>
<!-- Main Content Card -->
<main class="w-full max-w-5xl bg-white dark:bg-background-dark/50 rounded-xl overflow-hidden shadow-2xl flex flex-col md:flex-row border border-primary/10">
<!-- Left Side: Coffee Illustration -->
<div class="w-full md:w-1/2 relative bg-primary/5 min-h-[300px] md:min-h-full overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Close up of fresh espresso pouring into a ceramic cup" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCg5Vn1grXZtf3m8ksggAvRIrjTcDxHuiI_axNBBO8Nsv4yPHBWO5aipf3R6uWQfLsbNWorojmwmy0M3PiMt_VJZN6Z1mT9Gq5eMbg5h5DaV_lioW2DqQpm1ZpHcS1YeO-9MLUteUqGwdB-2rbzOQ-FXlG_Ah1g_IA69I0e__MXF9VoC1EXrB7P0hcmQaelzxBzXi-AV-26gnWvICEm0W4xdIZ8YeOYht4Rg_s5iOxcuxhf6y76Yujvei-6IaTB4pfWdh1tQvkJyLmb');">
</div>
<div class="absolute inset-0 bg-gradient-to-t from-primary/60 to-transparent"></div>
<div class="absolute bottom-10 left-10 text-white z-10">
<h3 class="text-3xl font-bold mb-2">Freshly Brewed Every Morning</h3>
<p class="text-white/80 font-medium">Experience the finest coffee and pastries in town.</p>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full md:w-1/2 p-8 lg:p-16 flex flex-col justify-center">
<div class="mb-10 text-center md:text-left">
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-2">Welcome Back</h1>
<p class="text-slate-600 dark:text-slate-400">Please enter your details to order your favorite brew.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 text-primary border-slate-300 rounded focus:ring-primary transition-all" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Remember for 30 days</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transform active:scale-[0.98] transition-all" type="submit">
                        Log In to Account
                    </button>
</form>
<!-- Footer Links -->
<div class="mt-10 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline transition-all ml-1" href="#">Create Account</a>
</p>
</div>
<div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-800">
<div class="flex flex-wrap justify-center gap-4 text-xs text-slate-400 font-medium">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</div>
</div>
</main>
<!-- Decorative Background Elements -->
<div class="fixed top-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary/5 blur-[120px] -z-10 rounded-full"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/5 blur-[120px] -z-10 rounded-full"></div>
</div>
</body></html>
